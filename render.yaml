services:
  - type: web
    name: url-shortener
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn app.main:app --worker-class uvicorn.workers.UvicornWorker --workers 2 --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: url-shortener-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: url-shortener-redis
          type: redis
          property: connectionString
      - key: SHORT_URL_BASE
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.6"

databases:
  - name: url-shortener-db
    plan: free
    databaseName: urlshortener
    user: urlshortener
